<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - MFD 2x2 Glass Edition</title>
    <style>
        /* ==========================================================================================
           1. デザインシステム＆テーマ定義
           ========================================================================================== */
        :root {
            /* デフォルト（モダンガラス - 強化版） */
            --bg-color: #000000;
            --card-bg: rgba(0, 0, 0, 0.3); /* 透明度を上げる */
            --card-border: rgba(255, 255, 255, 0.08); /* ボーダーを薄く */
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-color: #3182ce;
            --card-radius: 24px;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* テーマ：フラットダーク */
        body[data-theme="flat"] {
            --card-bg: #1e1e1e;
            --card-border: #333;
            --accent-color: #4ade80;
            --card-radius: 12px;
            --shadow: none;
        }

        /* テーマ：GT-R MFDスタイル */
        body[data-theme="gtr"] {
            --card-bg: linear-gradient(180deg, #1c1d21 0%, #0d0e12 100%);
            --card-border: #5a5c63;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --accent-color: #ff3c00;
            --card-radius: 6px;
            --font-main: Impact, sans-serif;
            --shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,1);
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-color); background-size: cover; background-position: center;
            color: var(--text-primary); font-family: var(--font-main);
            display: flex; height: 100vh; overflow: hidden; user-select: none;
            transition: background-image 0.5s ease;
        }

        /* === カード共通共通共通共通 === */
        .card {
            border-radius: var(--card-radius); padding: 20px; box-sizing: border-box;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; 
            background: var(--card-bg); border: 1px solid var(--card-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            min-width: 0; min-height: 0; 
        }

        /* === モダンガラス (defaultテーマ) のカード強化 === */
        body[data-theme="default"] .card {
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0));
        }
        body[data-theme="default"] .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.1), transparent 70%);
            pointer-events: none; z-index: -1;
        }

        /* ★ニュースカード専用の新聞背景（モダンガラス適用時のみ）★ */
        body[data-theme="default"] .news-card {
            background-image: linear-gradient(to right, rgba(0,0,0,0.95), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800');
            background-size: cover;
            background-position: center;
        }

        /* === GT-R MFDスタイル (gtrテーマ) のカード === */
        body[data-theme="gtr"] .card {
            border: 2px solid var(--card-border);
            box-shadow: var(--shadow);
            padding-bottom: 35px;
        }
        body[data-theme="gtr"] .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        body[data-theme="gtr"] .card-title, body[data-theme="gtr"] .news-source {
            color: var(--accent-color);
            font-weight: bold; letter-spacing: 1px;
            border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase;
        }
        body[data-theme="gtr"] .flip-card {
            background-color: #0a0a0c; border: 1px solid #333; color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,1);
        }

        .mfd-label { display: none; }
        body[data-theme="gtr"] .mfd-label {
            display: block; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            color: var(--accent-color); font-size: 14px; font-weight: 900;
            letter-spacing: 3px; opacity: 0.8; font-family: Impact, sans-serif;
        }

        /* ================= ================= ================= =================
           2. レイアウト (2x2 グリッド)
           ================= ================= ================= ================= */
        #dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px; width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
        }

        .hidden-card { display: none !important; }

        /* ================= ================= ================= =================
           3. コンポーネントスタイル
           ================= ================= ================= ================= */
        #clock-area { justify-content: center; align-items: center; }
        .clock-wrapper { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .flip-group { display: flex; gap: 4px; }
        .flip-card {
            background-color: rgba(45, 45, 45, 0.9); color: #ffffff;
            font-size: clamp(24px, 4vw, 70px); font-weight: bold; padding: 15px 10px;
            border-radius: 8px; min-width: 0.8em; text-align: center;
        }
        .colon { font-size: clamp(20px, 3vw, 40px); margin: 0 2px; }
        #date { font-size: 20px; color: var(--text-secondary); margin-top: 15px; }

        .weather-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        #w-main-icon { font-size: 60px; line-height: 1; margin-right: 10px;}
        .weather-main-temp { font-size: 44px; font-weight: bold; }
        
        .hourly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: auto; }
        .hourly-item { display: flex; flex-direction: column; align-items: center; font-size: 14px;}
        
        .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; flex-grow: 1; align-items: center; height: 100%; }
        .weekly-item { display: flex; flex-direction: column; align-items: center; font-size: 13px; }
        .temp-high { color: #fc8181; font-weight: bold; }
        .temp-low { color: #63b3ed; font-weight: bold; }

        .news-card { flex-direction: row; align-items: center; gap: 15px; }
        .news-content { flex: 1; display: flex; flex-direction: column; height: 100%; justify-content: center;}
        .news-source { font-size: 12px; color: var(--accent-color); margin-bottom: 5px; font-weight: bold; }
        .news-title { font-size: 18px; font-weight: bold; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-date { margin-top: 10px; font-size: 12px; color: var(--text-secondary); }
        .qr-container { width: 80px; height: 80px; background: #fff; padding: 5px; border-radius: 8px; flex-shrink: 0; }
        .qr-container img { width: 100%; height: 100%; object-fit: contain; }

        /* ================= ================= ================= =================
           4. 設定パネル
           ================= ================= ================= ================= */
        #menu-btn { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.5); border: 1px solid var(--card-border); border-radius: 8px; color: #fff; font-size: 22px; cursor: pointer; padding: 5px 10px; }
        #settings-panel { position: absolute; top: 0; left: -400px; width: 350px; height: 100vh; background: rgba(20, 20, 20, 0.95); z-index: 999; transition: left 0.3s ease; padding: 70px 20px 20px; box-sizing: border-box; overflow-y: auto; color: #fff;}
        #settings-panel.open { left: 0; }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
        .checkbox-label { display: flex; align-items: center; cursor: pointer; font-size: 14px; margin-bottom: 8px;}
        .checkbox-label input { margin-right: 10px; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .order-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .order-control select { width: 140px; padding: 6px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }

        .save-btn { width: 100%; padding: 15px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body data-theme="default">

    <button id="menu-btn">☰</button>
    
    <div id="settings-panel">
        <h2 style="margin-top:0; margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:10px;">設定</h2>
        
        <div class="setting-group" style="background:#222; padding:10px; border-radius:6px;">
            <label style="color:#fff; font-weight:bold; border-bottom:1px solid #444; margin-bottom:10px;">カード表示 (※4つ推奨)</label>
            <label class="checkbox-label"><input type="checkbox" id="set-show-clock" checked> 時計</label>
            <label class="checkbox-label"><input type="checkbox" id="set-show-weather" checked> 天気 (3時間ごと)</label>
            <label class="checkbox-label"><input type="checkbox" id="set-show-weekly" checked> 天気 (週間)</label>
            <label class="checkbox-label"><input type="checkbox" id="set-show-news1" checked> ニュース 1</label>
            <label class="checkbox-label"><input type="checkbox" id="set-show-news2"> ニュース 2</label>
        </div>

        <div class="setting-group" style="background:#222; padding:10px; border-radius:6px;">
            <label style="color:#fff; font-weight:bold; border-bottom:1px solid #444; margin-bottom:10px;">カードの配置順</label>
            <div class="order-control">
                <span>時計</span>
                <select id="set-order-clock">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                    <option value="5">5番目</option>
                </select>
            </div>
            <div class="order-control">
                <span>天気 (3時間)</span>
                <select id="set-order-weather">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                    <option value="5">5番目</option>
                </select>
            </div>
            <div class="order-control">
                <span>天気 (週間)</span>
                <select id="set-order-weekly">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                    <option value="5">5番目</option>
                </select>
            </div>
            <div class="order-control">
                <span>ニュース 1</span>
                <select id="set-order-news1">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                    <option value="5">5番目</option>
                </select>
            </div>
            <div class="order-control">
                <span>ニュース 2</span>
                <select id="set-order-news2">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                    <option value="5">5番目</option>
                </select>
            </div>
        </div>

        <div class="setting-group">
            <label>デザインテーマ</label>
            <select id="set-theme">
                <option value="default">モダンガラス (標準)</option>
                <option value="flat">フラットダーク</option>
                <option value="gtr">MFDスタイル (GT-R風)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>背景画像 (モダンガラスに最適)</label>
            <select id="set-bg-theme">
                <option value="city_night">都会の夜景 (標準)</option>
                <option value="abstract">抽象的な光</option>
                <option value="black">ソリッドブラック</option>
            </select>
        </div>

        <div class="setting-group">
            <label>更新頻度 (分)</label>
            <input type="number" id="set-freq" value="15" min="1" max="120">
        </div>

        <div class="setting-group">
            <label>郵便番号 (ハイフンなし)</label> 
            <input type="text" id="set-zip" maxlength="7" placeholder="2540000">
        </div>

        <div class="setting-group">
            <label>RSS URL (ニュース1)</label> 
            <input type="text" id="set-rss1">
        </div>

        <div class="setting-group">
            <label>RSS URL (ニュース2)</label> 
            <input type="text" id="set-rss2">
        </div>
        
        <button class="save-btn" onclick="saveSettings()">設定を保存して適用</button>
    </div>

    <div id="dashboard">
        
        <div class="card" id="clock-area">
            <div class="clock-wrapper">
                <div class="flip-group"><div class="flip-card" id="h1">0</div><div class="flip-card" id="h2">0</div></div>
                <div class="colon">:</div>
                <div class="flip-group"><div class="flip-card" id="m1">0</div><div class="flip-card" id="m2">0</div></div>
                <div class="colon">:</div>
                <div class="flip-group"><div class="flip-card" id="s1">0</div><div class="flip-card" id="s2">0</div></div>
            </div>
            <div id="date">--月--日</div>
            <div class="mfd-label">CLOCK</div>
        </div>
        
        <div class="card" id="weather-card">
            <div class="weather-top">
                <div class="weather-info-left">
                    <div class="card-title" id="w-desc" style="font-size: 18px; margin-bottom: 5px;">取得中...</div>
                    <div id="w-location" style="color: var(--text-secondary); font-size: 13px;">--</div>
                </div>
                <div class="weather-info-right" style="display:flex; align-items:center;">
                    <div id="w-main-icon">--</div>
                    <div class="weather-main-temp" id="w-temp">--°</div>
                </div>
            </div>
            <div class="hourly-grid" id="hourly-forecast">
                </div>
            <div class="mfd-label">WEATHER</div>
        </div>

        <div class="card" id="weekly-card">
            <div class="card-title" style="font-size: 16px; margin-bottom: 10px;">週間予報</div>
            <div class="weekly-grid" id="weekly-forecast">
                </div>
            <div class="mfd-label">WEEKLY</div>
        </div>

        <div class="card news-card" id="news-card-1">
            <div class="news-content">
                <div id="n-source-1" class="news-source">ニュース(1)取得中...</div>
                <div class="news-title" id="n-title-1">--</div>
                <div class="news-desc" id="n-desc-1">--</div>
                <div class="news-date" id="n-date-1">--/-- --:--</div>
            </div>
            <div class="qr-container"><img id="n-qr-1" src="" alt="QR"></div>
            <div class="mfd-label">NEWS 1</div>
        </div>

        <div class="card news-card" id="news-card-2">
            <div class="news-content">
                <div id="n-source-2" class="news-source">ニュース(2)取得中...</div>
                <div class="news-title" id="n-title-2">--</div>
                <div class="news-desc" id="n-desc-2">--</div>
                <div class="news-date" id="n-date-2">--/-- --:--</div>
            </div>
            <div class="qr-container"><img id="n-qr-2" src="" alt="QR"></div>
            <div class="mfd-label">NEWS 2</div>
        </div>
    </div>

    <script>
        let updateIntervalId = null;

        const getWMO = (code) => {
            if (code === 0) return { icon: '☀️', desc: '快晴' };
            if (code === 1 || code === 2) return { icon: '⛅', desc: '晴れ' };
            if (code === 3) return { icon: '☁️', desc: '曇り' };
            if (code >= 45 && code <= 48) return { icon: '🌫️', desc: '霧' };
            if (code >= 51 && code <= 67) return { icon: '🌧️', desc: '雨' };
            if (code >= 71 && code <= 77) return { icon: '❄️', desc: '雪' };
            if (code >= 80 && code <= 82) return { icon: '☔', desc: 'にわか雨' };
            if (code >= 95) return { icon: '⛈️', desc: '雷雨' };
            return { icon: '❓', desc: '不明' };
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('h1').textContent = h[0]; document.getElementById('h2').textContent = h[1];
            document.getElementById('m1').textContent = m[0]; document.getElementById('m2').textContent = m[1];
            document.getElementById('s1').textContent = s[0]; document.getElementById('s2').textContent = s[1];
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            document.getElementById('date').textContent = `${now.getMonth() + 1}月${now.getDate()}日 (${days[now.getDay()]})`;
        }
        setInterval(updateClock, 1000);

        function saveSettings() {
            localStorage.setItem('dash_zip', document.getElementById('set-zip').value);
            localStorage.setItem('dash_rss1', document.getElementById('set-rss1').value);
            localStorage.setItem('dash_rss2', document.getElementById('set-rss2').value);
            localStorage.setItem('dash_freq', document.getElementById('set-freq').value);
            localStorage.setItem('dash_theme', document.getElementById('set-theme').value);
            localStorage.setItem('dash_bg_theme', document.getElementById('set-bg-theme').value); 
            
            // 表示ON/OFF
            localStorage.setItem('dash_show_clock', document.getElementById('set-show-clock').checked);
            localStorage.setItem('dash_show_weather', document.getElementById('set-show-weather').checked);
            localStorage.setItem('dash_show_weekly', document.getElementById('set-show-weekly').checked);
            localStorage.setItem('dash_show_news1', document.getElementById('set-show-news1').checked);
            localStorage.setItem('dash_show_news2', document.getElementById('set-show-news2').checked);

            // 並び順
            localStorage.setItem('dash_order_clock', document.getElementById('set-order-clock').value);
            localStorage.setItem('dash_order_weather', document.getElementById('set-order-weather').value);
            localStorage.setItem('dash_order_weekly', document.getElementById('set-order-weekly').value);
            localStorage.setItem('dash_order_news1', document.getElementById('set-order-news1').value);
            localStorage.setItem('dash_order_news2', document.getElementById('set-order-news2').value);
            
            location.reload();
        }

        async function fetchNewsData(url, cardId) {
            if (!url) return;
            try {
                const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`;
                const res = await fetch(apiUrl);
                const data = await res.json();
                
                if (data.status === 'ok' && data.items.length > 0) {
                    const item = data.items[0];
                    let desc = (item.description || "").replace(/<[^>]+>/g, '');
                    if(desc.length > 80) desc = desc.substring(0, 80) + '...';
                    
                    document.getElementById(`n-source-${cardId}`).textContent = data.feed.title || `NEWS ${cardId}`;
                    document.getElementById(`n-title-${cardId}`).textContent = item.title;
                    document.getElementById(`n-desc-${cardId}`).textContent = desc;
                    
                    const d = new Date(item.pubDate.replace(/-/g, '/'));
                    const dateStr = !isNaN(d) ? `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : item.pubDate.substring(0,16);
                    document.getElementById(`n-date-${cardId}`).textContent = dateStr;
                    document.getElementById(`n-qr-${cardId}`).src = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(item.link)}`;
                } else {
                    throw new Error('データなし');
                }
            } catch (e) {
                document.getElementById(`n-title-${cardId}`).textContent = 'RSSの取得に失敗しました。URLを確認してください。';
                document.getElementById(`n-desc-${cardId}`).textContent = '※NHKのRSScat1,cat5以外のURLは弾かれる可能性があります。';
            }
        }

        async function fetchWeather(zip) {
            try {
                const geoUrl = `https://geoapi.heartrails.com/api/json?method=searchByPostal&postal=${zip}`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();
                let loc = { x: 139.35, y: 35.33, prefecture: "神奈川県", city: "平塚市" };
                if (geoData.response && geoData.response.location && geoData.response.location.length > 0) {
                    loc = geoData.response.location[0];
                }
                
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${loc.y}&longitude=${loc.x}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
                const wRes = await fetch(weatherUrl);
                const wData = await wRes.json();
                
                document.getElementById('w-location').textContent = `${loc.prefecture}${loc.city}`;
                document.getElementById('w-temp').textContent = `${Math.round(wData.current.temperature_2m)}°`;
                const weatherInfo = getWMO(wData.current.weather_code);
                document.getElementById('w-main-icon').textContent = weatherInfo.icon;
                document.getElementById('w-desc').textContent = weatherInfo.desc;

                let hHtml = '';
                const now = new Date();
                let startIndex = wData.hourly.time.findIndex(t => new Date(t) > now);
                if (startIndex === -1) startIndex = 0;
                for (let i = 0; i < 8; i++) {
                    const index = startIndex + (i * 3);
                    if (index < wData.hourly.time.length) {
                        const hInfo = getWMO(wData.hourly.weather_code[index]);
                        const hourVal = new Date(wData.hourly.time[index]).getHours();
                        const tempVal = Math.round(wData.hourly.temperature_2m[index]);
                        hHtml += `<div class="hourly-item">
                            <div style="color:var(--text-secondary);">${hourVal}時</div>
                            <div style="font-size:22px; margin:4px 0;">${hInfo.icon}</div>
                            <div style="font-weight:bold;">${tempVal}°</div>
                        </div>`;
                    }
                }
                document.getElementById('hourly-forecast').innerHTML = hHtml;

                let wHtml = '';
                const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                for (let i = 1; i < 8; i++) { 
                    if(wData.daily.time[i]) {
                        const dateObj = new Date(wData.daily.time[i]);
                        const dayStr = dayNames[dateObj.getDay()];
                        const dInfo = getWMO(wData.daily.weather_code[i]);
                        const maxT = Math.round(wData.daily.temperature_2m_max[i]);
                        const minT = Math.round(wData.daily.temperature_2m_min[i]);
                        wHtml += `<div class="weekly-item">
                            <div style="color:var(--text-secondary); margin-bottom:5px;">${dayStr}</div>
                            <div style="font-size:24px; margin-bottom:5px;">${dInfo.icon}</div>
                            <div><span class="temp-high">${maxT}°</span><br><span class="temp-low">${minT}°</span></div>
                        </div>`;
                    }
                }
                document.getElementById('weekly-forecast').innerHTML = wHtml;
                
            } catch (e) { document.getElementById('w-desc').textContent = '天気取得エラー'; }
        }

        window.onload = () => {
            const zip = localStorage.getItem('dash_zip') || '2540000';
            const rss1 = localStorage.getItem('dash_rss1') || 'https://news.web.nhk/n-data/conf/na/rss/cat1.xml';
            const rss2 = localStorage.getItem('dash_rss2') || 'https://news.web.nhk/n-data/conf/na/rss/cat5.xml';
            const freq = parseInt(localStorage.getItem('dash_freq')) || 15;
            const theme = localStorage.getItem('dash_theme') || 'default';
            const bgTheme = localStorage.getItem('dash_bg_theme') || 'city_night'; 
            
            const showClock = localStorage.getItem('dash_show_clock') !== 'false';
            const showWeather = localStorage.getItem('dash_show_weather') !== 'false';
            const showWeekly = localStorage.getItem('dash_show_weekly') !== 'false';
            const showNews1 = localStorage.getItem('dash_show_news1') !== 'false';
            
            const storedShowNews2 = localStorage.getItem('dash_show_news2');
            const showNews2 = storedShowNews2 === null ? false : storedShowNews2 !== 'false';

            const orderClock = localStorage.getItem('dash_order_clock') || '1';
            const orderWeather = localStorage.getItem('dash_order_weather') || '2';
            const orderWeekly = localStorage.getItem('dash_order_weekly') || '3';
            const orderNews1 = localStorage.getItem('dash_order_news1') || '4';
            const orderNews2 = localStorage.getItem('dash_order_news2') || '5';

            document.getElementById('set-zip').value = zip;
            document.getElementById('set-rss1').value = rss1;
            document.getElementById('set-rss2').value = rss2;
            document.getElementById('set-freq').value = freq;
            document.getElementById('set-theme').value = theme;
            document.getElementById('set-bg-theme').value = bgTheme; 
            
            document.getElementById('set-show-clock').checked = showClock;
            document.getElementById('set-show-weather').checked = showWeather;
            document.getElementById('set-show-weekly').checked = showWeekly;
            document.getElementById('set-show-news1').checked = showNews1;
            document.getElementById('set-show-news2').checked = showNews2;

            document.getElementById('set-order-clock').value = orderClock;
            document.getElementById('set-order-weather').value = orderWeather;
            document.getElementById('set-order-weekly').value = orderWeekly;
            document.getElementById('set-order-news1').value = orderNews1;
            document.getElementById('set-order-news2').value = orderNews2;

            if(!showClock) document.getElementById('clock-area').classList.add('hidden-card');
            if(!showWeather) document.getElementById('weather-card').classList.add('hidden-card');
            if(!showWeekly) document.getElementById('weekly-card').classList.add('hidden-card');
            if(!showNews1) document.getElementById('news-card-1').classList.add('hidden-card');
            if(!showNews2) document.getElementById('news-card-2').classList.add('hidden-card');

            document.getElementById('clock-area').style.order = orderClock;
            document.getElementById('weather-card').style.order = orderWeather;
            document.getElementById('weekly-card').style.order = orderWeekly;
            document.getElementById('news-card-1').style.order = orderNews1;
            document.getElementById('news-card-2').style.order = orderNews2;

            document.body.setAttribute('data-theme', theme);

            const cityNightUrl = "https://images.unsplash.com/photo-1549887552-cb1071d3e5ca?q=80&w=1600";
            const abstractUrl = "https://images.unsplash.com/photo-1520004434532-668416d0c78d?q=80&w=1600";

            if (theme === 'gtr') {
                document.body.style.backgroundImage = "none";
            } else {
                if (bgTheme === 'city_night') document.body.style.backgroundImage = `url('${cityNightUrl}')`;
                else if (bgTheme === 'abstract') document.body.style.backgroundImage = `url('${abstractUrl}')`;
                else document.body.style.backgroundImage = "none";
            }

            updateClock();
            if(showWeather || showWeekly) fetchWeather(zip);
            if(showNews1) fetchNewsData(rss1, 1);
            if(showNews2) fetchNewsData(rss2, 2);
            
            if(updateIntervalId) clearInterval(updateIntervalId);
            updateIntervalId = setInterval(() => { 
                if(showWeather || showWeekly) fetchWeather(zip); 
                if(showNews1) fetchNewsData(rss1, 1); 
                if(showNews2) fetchNewsData(rss2, 2); 
            }, freq * 60000);
        };

        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.toggle('open');
        });
    </script>
</body>
</html>
