<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - 2x2 Ultimate Edition</title>
    <style>
        /* ==========================================================================================
           1. デザインシステム＆テーマ定義
           ========================================================================================== */
        :root {
            /* デフォルト（モダンガラス・ソリッドブラック背景） */
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.05); /* うっすらとしたガラス感 */
            --card-border: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --accent-color: #3182ce;
            --card-radius: 24px;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        /* テーマ：フラットダーク */
        body[data-theme="flat"] {
            --card-bg: #1e1e1e;
            --card-border: #333;
            --accent-color: #4ade80;
            --card-radius: 12px;
            --shadow: none;
        }

        /* テーマ：GT-R MFDスタイル */
        body[data-theme="gtr"] {
            --card-bg: linear-gradient(180deg, #1c1d21 0%, #0d0e12 100%);
            --card-border: #5a5c63;
            --text-primary: #f8f9fa;
            --text-secondary: #adb5bd;
            --accent-color: #ff3c00;
            --card-radius: 6px;
            --font-main: Impact, sans-serif;
            --shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,1);
        }

        body {
            margin: 0; padding: 0; 
            background-color: var(--bg-color); /* 背景画像は排除し黒で統一 */
            color: var(--text-primary); font-family: var(--font-main);
            display: flex; height: 100vh; overflow: hidden; user-select: none;
        }

        /* === カード共通 === */
        .card {
            border-radius: var(--card-radius); padding: 20px; box-sizing: border-box;
            box-shadow: var(--shadow); position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; 
            background: var(--card-bg); border: 1px solid var(--card-border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            min-width: 0; min-height: 0; 
        }

        /* モダンガラスのエッジライト効果 */
        body[data-theme="default"] .card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
        }
        body[data-theme="default"] .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.1), transparent 70%);
            pointer-events: none; z-index: -1;
        }

        /* GT-R MFDスタイルの装飾 */
        body[data-theme="gtr"] .card {
            border: 2px solid var(--card-border); padding-bottom: 35px;
        }
        body[data-theme="gtr"] .card-title, body[data-theme="gtr"] .news-source {
            color: var(--accent-color); font-weight: bold; letter-spacing: 1px;
            border-bottom: 1px solid #333; padding-bottom: 5px; text-transform: uppercase;
        }
        body[data-theme="gtr"] .flip-card {
            background-color: #0a0a0c; border: 1px solid #333; color: #fff;
            box-shadow: inset 0 0 10px rgba(0,0,0,1);
        }

        /* MFD専用のカード下部ラベル */
        .mfd-label { display: none; }
        body[data-theme="gtr"] .mfd-label {
            display: block; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            color: var(--accent-color); font-size: 14px; font-weight: 900;
            letter-spacing: 3px; opacity: 0.8; font-family: Impact, sans-serif;
        }

        /* ================= ================= =================
           2. レイアウト (2x2 グリッド固定)
           ================= ================= ================= */
        #dashboard {
            display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 20px; width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
        }

        /* ================= ================= =================
           3. コンポーネントスタイル
           ================= ================= ================= */
        /* 時計・アニメーション */
        #clock-area { justify-content: center; align-items: center; }
        .clock-wrapper { display: flex; align-items: center; justify-content: center; gap: 4px; }
        .flip-group { display: flex; gap: 4px; }
        .flip-card {
            background-color: rgba(45, 45, 45, 0.9); color: #ffffff;
            font-size: clamp(30px, 5vw, 80px); font-weight: bold; padding: 15px 12px;
            border-radius: 8px; min-width: 0.8em; text-align: center;
            /* アニメーション用の遷移設定 */
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .colon { font-size: clamp(24px, 4vw, 50px); margin: 0 4px; }
        #date { font-size: 20px; color: var(--text-secondary); margin-top: 15px; }

        /* 天気共通 */
        .weather-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        #w-main-icon { font-size: 60px; line-height: 1; margin-right: 10px;}
        .weather-main-temp { font-size: 44px; font-weight: bold; }
        
        .hourly-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: auto; }
        .hourly-item { display: flex; flex-direction: column; align-items: center; font-size: 15px;}
        
        .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; flex-grow: 1; align-items: center; height: 100%; }
        .weekly-item { display: flex; flex-direction: column; align-items: center; font-size: 14px; }
        .temp-high { color: #fc8181; font-weight: bold; }
        .temp-low { color: #63b3ed; font-weight: bold; }

        /* ニュースカード (自動スクロール & 2件表示) */
        #news-card { display: flex; flex-direction: column; }
        .news-header { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: var(--accent-color); border-bottom: 1px solid var(--card-border); padding-bottom: 5px; }
        .news-container { flex: 1; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .news-wrapper { transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); width: 100%; }
        .news-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); box-sizing: border-box; padding: 10px 0; }
        .news-content { flex: 1; padding-right: 15px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .news-source { font-size: 11px; color: var(--accent-color); margin-bottom: 4px; font-weight: bold; }
        .news-title { font-size: 16px; font-weight: bold; line-height: 1.3; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-date { font-size: 11px; color: var(--text-secondary); }
        .qr-container { width: 60px; height: 60px; background: #fff; padding: 4px; border-radius: 6px; flex-shrink: 0; }
        .qr-container img { width: 100%; height: 100%; object-fit: contain; }

        /* ================= ================= =================
           4. 設定パネル
           ================= ================= ================= */
        #menu-btn { position: absolute; top: 15px; left: 15px; z-index: 1000; background: rgba(0,0,0,0.5); border: 1px solid var(--card-border); border-radius: 8px; color: #fff; font-size: 22px; cursor: pointer; padding: 5px 10px; }
        #settings-panel { position: absolute; top: 0; left: -400px; width: 350px; height: 100vh; background: rgba(20, 20, 20, 0.95); z-index: 999; transition: left 0.3s ease; padding: 70px 20px 20px; box-sizing: border-box; overflow-y: auto; color: #fff;}
        #settings-panel.open { left: 0; }
        .setting-group { margin-bottom: 18px; }
        .setting-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #aaa; font-weight: bold; }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .order-control { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 14px; }
        .order-control select { width: 140px; padding: 6px; }

        .save-btn { width: 100%; padding: 15px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body data-theme="default">

    <button id="menu-btn">☰</button>
    
    <div id="settings-panel">
        <h2 style="margin-top:0; margin-bottom:15px; border-bottom:1px solid #444; padding-bottom:10px;">設定</h2>

        <div class="setting-group" style="background:#222; padding:10px; border-radius:6px;">
            <label style="color:#fff; border-bottom:1px solid #444; margin-bottom:10px; padding-bottom:5px;">カード配置順</label>
            <div class="order-control">
                <span>時計</span>
                <select id="set-order-clock">
                    <option value="1">1番目 (左上)</option>
                    <option value="2">2番目 (右上)</option>
                    <option value="3">3番目 (左下)</option>
                    <option value="4">4番目 (右下)</option>
                </select>
            </div>
            <div class="order-control">
                <span>天気 (3時間)</span>
                <select id="set-order-weather">
                    <option value="1">1番目 (左上)</option><option value="2">2番目 (右上)</option><option value="3">3番目 (左下)</option><option value="4">4番目 (右下)</option>
                </select>
            </div>
            <div class="order-control">
                <span>天気 (週間)</span>
                <select id="set-order-weekly">
                    <option value="1">1番目 (左上)</option><option value="2">2番目 (右上)</option><option value="3">3番目 (左下)</option><option value="4">4番目 (右下)</option>
                </select>
            </div>
            <div class="order-control">
                <span>ニュース</span>
                <select id="set-order-news">
                    <option value="1">1番目 (左上)</option><option value="2">2番目 (右上)</option><option value="3">3番目 (左下)</option><option value="4">4番目 (右下)</option>
                </select>
            </div>
        </div>

        <div class="setting-group">
            <label>デザインテーマ</label>
            <select id="set-theme">
                <option value="default">モダンガラス</option>
                <option value="flat">フラットダーク</option>
                <option value="gtr">MFDスタイル (GT-R風)</option>
            </select>
        </div>

        <div class="setting-group">
            <label>時計アニメーション</label>
            <select id="set-clock-anim">
                <option value="flip">パタパタ</option>
                <option value="slide">スライド</option>
                <option value="fade">フェード</option>
            </select>
        </div>

        <div class="setting-group">
            <label>ニュース スクロール間隔</label>
            <select id="set-news-speed">
                <option value="3000">3秒ごと</option>
                <option value="5000">5秒ごと</option>
                <option value="10000">10秒ごと</option>
            </select>
        </div>

        <div class="setting-group">
            <label>データ更新頻度 (分)</label>
            <input type="number" id="set-freq" value="15" min="1" max="120">
        </div>

        <div class="setting-group">
            <label>郵便番号 (ハイフンなし)</label> 
            <input type="text" id="set-zip" maxlength="7" placeholder="2540000">
        </div>

        <div class="setting-group">
            <label>RSS URL 1</label> 
            <input type="text" id="set-rss1">
        </div>
        <div class="setting-group">
            <label>RSS URL 2</label> 
            <input type="text" id="set-rss2">
        </div>
        
        <button class="save-btn" onclick="saveSettings()">設定を保存して適用</button>
    </div>

    <div id="dashboard">
        
        <div class="card" id="card-clock">
            <div class="clock-wrapper">
                <div class="flip-group"><div class="flip-card" id="h1">0</div><div class="flip-card" id="h2">0</div></div>
                <div class="colon">:</div>
                <div class="flip-group"><div class="flip-card" id="m1">0</div><div class="flip-card" id="m2">0</div></div>
                <div class="colon">:</div>
                <div class="flip-group"><div class="flip-card" id="s1">0</div><div class="flip-card" id="s2">0</div></div>
            </div>
            <div id="date">--月--日</div>
            <div class="mfd-label">CLOCK</div>
        </div>
        
        <div class="card" id="card-weather-hourly">
            <div class="weather-top">
                <div class="weather-info-left">
                    <div class="card-title" id="w-desc" style="font-size: 18px; margin-bottom: 5px;">取得中...</div>
                    <div id="w-location" style="color: var(--text-secondary); font-size: 13px;">--</div>
                </div>
                <div class="weather-info-right" style="display:flex; align-items:center;">
                    <div id="w-main-icon">--</div>
                    <div class="weather-main-temp" id="w-temp">--°</div>
                </div>
            </div>
            <div class="hourly-grid" id="hourly-forecast"></div>
            <div class="mfd-label">WEATHER</div>
        </div>

        <div class="card" id="card-weather-weekly">
            <div class="news-header">WEEKLY FORECAST</div>
            <div class="weekly-grid" id="weekly-forecast"></div>
            <div class="mfd-label">WEEKLY</div>
        </div>

        <div class="card" id="card-news">
            <div class="news-header">LATEST NEWS</div>
            <div class="news-container" id="news-container">
                <div class="news-wrapper" id="news-wrapper">
                    </div>
            </div>
            <div class="mfd-label">NEWS</div>
        </div>
    </div>

    <script>
        let updateIntervalId = null;
        let newsScrollIntervalId = null;
        let newsItemsData = [];
        let currentNewsIndex = 0;
        let clockAnimType = 'flip';

        const getWMO = (code) => {
            if (code === 0) return { icon: '☀️', desc: '快晴' };
            if (code === 1 || code === 2) return { icon: '⛅', desc: '晴れ' };
            if (code === 3) return { icon: '☁️', desc: '曇り' };
            if (code >= 45 && code <= 48) return { icon: '🌫️', desc: '霧' };
            if (code >= 51 && code <= 67) return { icon: '🌧️', desc: '雨' };
            if (code >= 71 && code <= 77) return { icon: '❄️', desc: '雪' };
            if (code >= 80 && code <= 82) return { icon: '☔', desc: 'にわか雨' };
            if (code >= 95) return { icon: '⛈️', desc: '雷雨' };
            return { icon: '❓', desc: '不明' };
        };

        // --- 時計処理 (アニメーション付き) ---
        function updateDigit(id, newValue) {
            const el = document.getElementById(id);
            if (el.textContent !== newValue) {
                if (clockAnimType === 'fade') {
                    el.style.opacity = '0';
                    setTimeout(() => { el.textContent = newValue; el.style.opacity = '1'; }, 200);
                } else if (clockAnimType === 'slide') {
                    el.style.transform = 'translateY(-15px)'; el.style.opacity = '0';
                    setTimeout(() => {
                        el.textContent = newValue;
                        el.style.transform = 'translateY(15px)';
                        setTimeout(() => { el.style.transform = 'translateY(0)'; el.style.opacity = '1'; }, 50);
                    }, 200);
                } else { // flip (パタパタ)
                    el.style.transform = 'rotateX(90deg)';
                    setTimeout(() => { el.textContent = newValue; el.style.transform = 'rotateX(0deg)'; }, 150);
                }
            }
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            updateDigit('h1', h[0]); updateDigit('h2', h[1]);
            updateDigit('m1', m[0]); updateDigit('m2', m[1]);
            updateDigit('s1', s[0]); updateDigit('s2', s[1]);
            
            const days = ['日', '月', '火', '水', '木', '金', '土'];
            document.getElementById('date').textContent = `${now.getMonth() + 1}月${now.getDate()}日 (${days[now.getDay()]})`;
        }

        // --- 設定保存 ---
        function saveSettings() {
            localStorage.setItem('dash_zip', document.getElementById('set-zip').value);
            localStorage.setItem('dash_rss1', document.getElementById('set-rss1').value);
            localStorage.setItem('dash_rss2', document.getElementById('set-rss2').value);
            localStorage.setItem('dash_freq', document.getElementById('set-freq').value);
            localStorage.setItem('dash_theme', document.getElementById('set-theme').value);
            localStorage.setItem('dash_clock_anim', document.getElementById('set-clock-anim').value);
            localStorage.setItem('dash_news_speed', document.getElementById('set-news-speed').value);
            
            localStorage.setItem('dash_order_clock', document.getElementById('set-order-clock').value);
            localStorage.setItem('dash_order_weather_h', document.getElementById('set-order-weather').value);
            localStorage.setItem('dash_order_weather_w', document.getElementById('set-order-weekly').value);
            localStorage.setItem('dash_order_news', document.getElementById('set-order-news').value);
            
            location.reload();
        }

        // --- ニュース処理 (結合 & スクロール) ---
        async function fetchNewsData(url1, url2) {
            let combined = [];
            for (let url of [url1, url2]) {
                if (!url) continue;
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    if (data.status === 'ok') {
                        const source = data.feed.title || 'NEWS';
                        const items = data.items.map(item => ({...item, source}));
                        combined = combined.concat(items);
                    }
                } catch (e) { console.error("RSS fetch error"); }
            }
            newsItemsData = combined;
            renderNewsItems();
        }

        function renderNewsItems() {
            const wrapper = document.getElementById('news-wrapper');
            const container = document.getElementById('news-container');
            wrapper.innerHTML = '';
            if (newsItemsData.length === 0) {
                wrapper.innerHTML = '<div style="padding:20px; color:#aaa;">ニュースを取得できませんでした</div>';
                return;
            }

            // コンテナの半分の高さを「1記事分の高さ」として指定 (1画面2記事表示)
            const itemHeight = container.clientHeight / 2;
            
            newsItemsData.forEach(item => {
                let desc = (item.description || "").replace(/<[^>]+>/g, '');
                const d = new Date(item.pubDate.replace(/-/g, '/'));
                const dateStr = !isNaN(d) ? `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}` : item.pubDate.substring(0,16);

                const div = document.createElement('div');
                div.className = 'news-item';
                div.style.height = `${itemHeight}px`; // 高さを固定
                div.innerHTML = `
                    <div class="news-content">
                        <div class="news-source">${item.source}</div>
                        <div class="news-title">${item.title}</div>
                        <div class="news-date">${dateStr}</div>
                    </div>
                    <div class="qr-container"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(item.link)}" alt="QR"></div>
                `;
                wrapper.appendChild(div);
            });

            startNewsScroll(itemHeight);
        }

        function startNewsScroll(itemHeight) {
            if (newsScrollIntervalId) clearInterval(newsScrollIntervalId);
            const speed = parseInt(localStorage.getItem('dash_news_speed')) || 5000;
            const wrapper = document.getElementById('news-wrapper');
            
            newsScrollIntervalId = setInterval(() => {
                if (newsItemsData.length <= 2) return; // 2件以下の場合はスクロール不要
                currentNewsIndex += 2; // 2件ずつ進む
                if (currentNewsIndex >= newsItemsData.length) currentNewsIndex = 0;
                
                wrapper.style.transform = `translateY(-${currentNewsIndex * itemHeight}px)`;
            }, speed);
        }

        // リサイズ時にニュースの高さを再計算
        window.addEventListener('resize', () => {
            if(newsItemsData.length > 0) renderNewsItems();
        });

        // --- 天気処理 ---
        async function fetchWeather(zip) {
            try {
                const geoUrl = `https://geoapi.heartrails.com/api/json?method=searchByPostal&postal=${zip}`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();
                let loc = { x: 139.35, y: 35.33, prefecture: "神奈川県", city: "平塚市" };
                if (geoData.response && geoData.response.location && geoData.response.location.length > 0) {
                    loc = geoData.response.location[0];
                }
                
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${loc.y}&longitude=${loc.x}&current=temperature_2m,weather_code&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo`;
                const wRes = await fetch(weatherUrl);
                const wData = await wRes.json();
                
                document.getElementById('w-location').textContent = `${loc.prefecture}${loc.city}`;
                document.getElementById('w-temp').textContent = `${Math.round(wData.current.temperature_2m)}°`;
                const weatherInfo = getWMO(wData.current.weather_code);
                document.getElementById('w-main-icon').textContent = weatherInfo.icon;
                document.getElementById('w-desc').textContent = weatherInfo.desc;

                let hHtml = '';
                const now = new Date();
                let startIndex = wData.hourly.time.findIndex(t => new Date(t) > now);
                if (startIndex === -1) startIndex = 0;
                for (let i = 0; i < 4; i++) { // 3時間ごとは4枠表示
                    const index = startIndex + (i * 3);
                    if (index < wData.hourly.time.length) {
                        const hInfo = getWMO(wData.hourly.weather_code[index]);
                        const hourVal = new Date(wData.hourly.time[index]).getHours();
                        const tempVal = Math.round(wData.hourly.temperature_2m[index]);
                        hHtml += `<div class="hourly-item">
                            <div style="color:var(--text-secondary);">${hourVal}時</div>
                            <div style="font-size:26px; margin:6px 0;">${hInfo.icon}</div>
                            <div style="font-weight:bold;">${tempVal}°</div>
                        </div>`;
                    }
                }
                document.getElementById('hourly-forecast').innerHTML = hHtml;

                let wHtml = '';
                const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                for (let i = 1; i < 8; i++) { 
                    if(wData.daily.time[i]) {
                        const dateObj = new Date(wData.daily.time[i]);
                        const dayStr = dayNames[dateObj.getDay()];
                        const dInfo = getWMO(wData.daily.weather_code[i]);
                        const maxT = Math.round(wData.daily.temperature_2m_max[i]);
                        const minT = Math.round(wData.daily.temperature_2m_min[i]);
                        wHtml += `<div class="weekly-item">
                            <div style="color:var(--text-secondary); margin-bottom:5px;">${dayStr}</div>
                            <div style="font-size:24px; margin-bottom:5px;">${dInfo.icon}</div>
                            <div><span class="temp-high">${maxT}°</span><br><span class="temp-low">${minT}°</span></div>
                        </div>`;
                    }
                }
                document.getElementById('weekly-forecast').innerHTML = wHtml;
                
            } catch (e) { document.getElementById('w-desc').textContent = '天気取得エラー'; }
        }

        // --- 初期化 ---
        window.onload = () => {
            const zip = localStorage.getItem('dash_zip') || '2540000';
            const rss1 = localStorage.getItem('dash_rss1') || 'https://news.web.nhk/n-data/conf/na/rss/cat1.xml';
            const rss2 = localStorage.getItem('dash_rss2') || 'https://news.web.nhk/n-data/conf/na/rss/cat5.xml';
            const freq = parseInt(localStorage.getItem('dash_freq')) || 15;
            const theme = localStorage.getItem('dash_theme') || 'default';
            clockAnimType = localStorage.getItem('dash_clock_anim') || 'flip';
            const newsSpeed = localStorage.getItem('dash_news_speed') || '5000';

            const orderClock = localStorage.getItem('dash_order_clock') || '1';
            const orderWeatherH = localStorage.getItem('dash_order_weather_h') || '2';
            const orderWeatherW = localStorage.getItem('dash_order_weather_w') || '3';
            const orderNews = localStorage.getItem('dash_order_news') || '4';

            // UIへの値セット
            document.getElementById('set-zip').value = zip;
            document.getElementById('set-rss1').value = rss1;
            document.getElementById('set-rss2').value = rss2;
            document.getElementById('set-freq').value = freq;
            document.getElementById('set-theme').value = theme;
            document.getElementById('set-clock-anim').value = clockAnimType;
            document.getElementById('set-news-speed').value = newsSpeed;

            document.getElementById('set-order-clock').value = orderClock;
            document.getElementById('set-order-weather').value = orderWeatherH;
            document.getElementById('set-order-weekly').value = orderWeatherW;
            document.getElementById('set-order-news').value = orderNews;

            // 配置順の適用
            document.getElementById('card-clock').style.order = orderClock;
            document.getElementById('card-weather-hourly').style.order = orderWeatherH;
            document.getElementById('card-weather-weekly').style.order = orderWeatherW;
            document.getElementById('card-news').style.order = orderNews;

            // テーマの適用
            document.body.setAttribute('data-theme', theme);

            // 初回実行
            setInterval(updateClock, 1000);
            updateClock();
            fetchWeather(zip);
            fetchNewsData(rss1, rss2);
            
            // 定期更新設定
            if(updateIntervalId) clearInterval(updateIntervalId);
            updateIntervalId = setInterval(() => { 
                fetchWeather(zip); 
                fetchNewsData(rss1, rss2); 
            }, freq * 60000);
        };

        // メニューの開閉
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('settings-panel').classList.toggle('open');
            // メニューを閉じた時にニュースの高さを再計算（表示領域の変更に対応するため）
            setTimeout(renderNewsItems, 350); 
        });
    </script>
</body>
</html>
